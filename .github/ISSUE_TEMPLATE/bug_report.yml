name: Raportare eroare
description: Semnalați o problemă reproductibilă fără date personale sau secrete.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Nu includeți cheia API, parole, exporturi WoS integrale sau date personale.
  - type: input
    id: version
    attributes:
      label: Versiunea proiectului
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Sistem și versiune Python
      placeholder: Windows 11, Python 3.11
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pași de reproducere
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Rezultat așteptat
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Rezultat obținut
    validations:
      required: true

